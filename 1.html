<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Lab: Always Smooth</title>
    <style>
        :root {
            --bg: #030303;
            --panel-bg: rgba(18, 18, 20, 0.9);
            --accent: #00f2ff;
            --text: #e2e2e2;
            --text-dim: #71717a;
            --stats-bg: rgba(0, 0, 0, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #controls { 
                width: 100% !important; 
                height: 40% !important; 
                border-right: none !important; 
                border-top: 1px solid rgba(255,255,255,0.05); 
                order: 2;
            }
            #canvas-container { order: 1; flex-grow: 1; }
            #stats-overlay, #show-stats-btn { left: 10px !important; }
        }

        #stats-overlay {
            position: absolute;
            top: 20px;
            left: 320px;
            padding: 30px 15px 15px 15px; 
            background: var(--stats-bg);
            backdrop-filter: blur(8px);
            border-left: 2px solid var(--accent);
            font-family: 'monospace';
            font-size: 11px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        #stats-overlay.hidden {
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
        }

        .toggle-hud-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            transition: 0.2s;
        }

        .toggle-hud-btn:hover { background: #ff4d4d; color: white; border-color: #ff4d4d; }

        #show-stats-btn {
            position: absolute;
            top: 20px;
            left: 320px;
            width: 35px;
            height: 35px;
            background: var(--panel-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 4px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 4;
        }

        #controls { 
            width: 300px; 
            background: var(--panel-bg); 
            backdrop-filter: blur(12px);
            padding: 24px; 
            border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 10;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        #canvas-container { position: relative; flex-grow: 1; overflow: hidden; touch-action: none; }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; image-rendering: pixelated; }

        .group { display: flex; flex-direction: column; gap: 8px; }
        .group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); font-weight: 700; }
        label { font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .val { color: var(--accent); font-family: monospace; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #2d2d30; border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; }
        select { background: #1a1a1e; color: white; border: 1px solid #333; padding: 8px; border-radius: 6px; width: 100%; font-size: 14px; }
        input[type="color"] { width: 100%; height: 30px; border: none; background: none; cursor: pointer; }
        .btn-row { display: flex; gap: 10px; margin-top: auto; padding-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px; transition: 0.2s; }
        #clearBtn { background: #27272a; color: #fff; }
        #saveBtn { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<button id="show-stats-btn" title="Показать информацию">i</button>

<div id="stats-overlay">
    <button class="toggle-hud-btn" id="hide-stats-btn">✕</button>
    <div class="stats-item">FPS: <span id="fps-val">0</span></div>
    <div class="stats-item">Particles: <span id="count-val">0</span></div>
    <div class="stats-item">Spawn Points: <span id="spawn-val">0</span></div>
    <div class="stats-item">Scale: <span id="scale-val">0</span></div>
    <div class="stats-item">Status: <span style="color: #4ade80;">ACTIVE</span></div>
</div>

<div id="controls">
    <div style="font-weight: 900; font-size: 20px; letter-spacing: -1px;">PIXEL<span style="color:var(--accent)">LAB</span></div>

    <div class="group">
        <div class="group-title">Визуал</div>
        <input type="color" id="particleColor" value="#00f2ff">
        <label><input type="checkbox" id="rainbowMode"> Радуга</label>
    </div>

    <div class="group">
        <div class="group-title">Форма Появления</div>
        <select id="sPattern">
            <option value="circle_solid">Плотный Круг</option>
            <option value="square_outline">Контур Квадрата</option>
            <option value="plus_solid">Плотный Плюс</option>
        </select>
    </div>

    <div class="group">
        <div class="group-title">Параметры</div>
        <label>Размер пикселя <span class="val" id="val-pSize">5</span></label>
        <input type="range" id="pSize" min="1" max="15" value="5">
        
        <label>Масштаб фигуры <span class="val" id="val-spawnScale">30</span></label>
        <input type="range" id="spawnScale" min="5" max="150" value="30">
        
        <label>Детализация <span class="val" id="val-spawnDensity">5</span></label>
        <input type="range" id="spawnDensity" min="1" max="20" value="5">
        
        <label>Длина шлейфа <span class="val" id="val-trailAlpha">0.15</span></label>
        <input type="range" id="trailAlpha" min="0.01" max="0.5" step="0.01" value="0.15">
        
        <label>Скорость разлета <span class="val" id="val-speed">0.5</span></label>
        <input type="range" id="speed" min="0" max="4" step="0.1" value="0.5">

        <label>Время жизни <span class="val" id="val-lifeSpan">50</span></label>
        <input type="range" id="lifeSpan" min="1" max="100" step="1" value="50">
    </div>

    <div class="btn-row">
        <button id="clearBtn">СБРОС</button>
        <button id="saveBtn">PNG</button>
    </div>
</div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    
    const statsOverlay = document.getElementById('stats-overlay');
    const hideBtn = document.getElementById('hide-stats-btn');
    const showBtn = document.getElementById('show-stats-btn');

    const fpsEl = document.getElementById('fps-val');
    const countEl = document.getElementById('count-val');
    const spawnEl = document.getElementById('spawn-val');
    const scaleEl = document.getElementById('scale-val');

    let particles = [], isDrawing = false;
    let lastTime = 0, frames = 0, fps = 0;
    let mouse = { x: 0, y: 0 };
    
    const config = { 
        sPattern: 'circle_solid',
        speed: 0.5, 
        spawnDensity: 5, 
        lifeSpan: 50, 
        trailAlpha: 0.15, 
        color: '#00f2ff', isRainbow: false, 
        pSize: 5, spawnScale: 30 
    };

    function resize() {
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    window.addEventListener('resize', resize);
    resize();

    hideBtn.onclick = () => {
        statsOverlay.classList.add('hidden');
        showBtn.style.display = 'flex';
    };

    showBtn.onclick = () => {
        statsOverlay.classList.remove('hidden');
        showBtn.style.display = 'none';
    };

    function getPatternPoints() {
        const points = [];
        const density = config.spawnDensity;
        const scale = config.spawnScale;

        if (config.sPattern === 'plus_solid') {
            for (let i = -density; i <= density; i++) {
                let offset = (i / density) * scale;
                points.push({x: offset, y: 0, vx: offset/scale, vy: 0});
                points.push({x: 0, y: offset, vx: 0, vy: offset/scale});
            }
        } 
        else if (config.sPattern === 'circle_solid') {
            const total = density * 8; 
            for (let i = 0; i < total; i++) {
                let angle = (i / total) * Math.PI * 2;
                points.push({
                    x: Math.cos(angle) * scale, 
                    y: Math.sin(angle) * scale,
                    vx: Math.cos(angle), vy: Math.sin(angle)
                });
            }
        }
        else if (config.sPattern === 'square_outline') {
            for (let i = -density; i <= density; i++) {
                let pos = (i / density) * scale;
                points.push({x: pos, y: -scale, vx: pos/scale, vy: -1});
                points.push({x: pos, y: scale, vx: pos/scale, vy: 1});
                points.push({x: -scale, y: pos, vx: -1, vy: pos/scale});
                points.push({x: scale, y: pos, vx: 1, vy: pos/scale});
            }
        }
        return points;
    }

    class Particle {
        constructor(x, y, vx, vy, hue) {
            this.x = x; this.y = y;
            this.vx = vx * config.speed; 
            this.vy = vy * config.speed;
            this.life = 1.0;
            this.hue = hue;
            this.decay = 0.11 - (config.lifeSpan / 1000);
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
        }
        draw() {
            ctx.fillStyle = config.isRainbow ? `hsl(${this.hue}, 80%, 60%)` : config.color;
            ctx.globalAlpha = Math.max(0, this.life);
            const s = config.pSize;
            ctx.fillRect(this.x - s/2, this.y - s/2, s, s);
        }
    }

    function updateStats(timestamp) {
        frames++;
        if (timestamp > lastTime + 1000) {
            fps = Math.round((frames * 1000) / (timestamp - lastTime));
            lastTime = timestamp;
            frames = 0;
            if (!statsOverlay.classList.contains('hidden')) fpsEl.innerText = fps;
        }
        if (!statsOverlay.classList.contains('hidden')) {
            countEl.innerText = particles.length;
            scaleEl.innerText = config.spawnScale;
            spawnEl.innerText = isDrawing ? getPatternPoints().length : 0;
        }
    }

    function animate(timestamp) {
        updateStats(timestamp);

        ctx.globalAlpha = 1.0;
        const fillOpacity = 0.51 - config.trailAlpha;
        ctx.fillStyle = `rgba(3, 3, 3, ${fillOpacity})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (isDrawing) {
            const pts = getPatternPoints();
            pts.forEach(p => {
                particles.push(new Particle(
                    mouse.x + p.x, 
                    mouse.y + p.y, 
                    p.vx, 
                    p.vy,
                    (Date.now() / 10) % 360
                ));
            });
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
        requestAnimationFrame(animate);
    }

    // Обработка ввода (Мышь + Тач)
    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = clientX - rect.left;
        mouse.y = clientY - rect.top;
    }

    canvas.addEventListener('mousedown', (e) => { isDrawing = true; handleInput(e); });
    canvas.addEventListener('mousemove', handleInput);
    window.addEventListener('mouseup', () => isDrawing = false);

    canvas.addEventListener('touchstart', (e) => { isDrawing = true; handleInput(e); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
    window.addEventListener('touchend', () => isDrawing = false);

    // Настройки
    document.getElementById('particleColor').oninput = (e) => config.color = e.target.value;
    document.getElementById('rainbowMode').onchange = (e) => config.isRainbow = e.target.checked;
    document.getElementById('sPattern').onchange = (e) => config.sPattern = e.target.value;
    
    ['pSize', 'spawnDensity', 'trailAlpha', 'lifeSpan', 'speed', 'spawnScale'].forEach(id => {
        const el = document.getElementById(id);
        if(el) {
            el.oninput = (e) => {
                config[id] = parseFloat(e.target.value);
                document.getElementById('val-' + id).innerText = config[id];
            };
        }
    });

    document.getElementById('clearBtn').onclick = () => { particles = []; ctx.clearRect(0,0,canvas.width, canvas.height); };
    document.getElementById('saveBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'pixel-art.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    requestAnimationFrame(animate);
</script>
</body>
</html>
